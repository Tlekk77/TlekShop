<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปี๊ยกเองจั้ฟฟ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .checkout-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.3); width: 90%; max-width: 400px; z-index: 1000; max-height: 85vh; overflow-y: auto; }
        input, button, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Kanit'; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .qr-img { width: 180px; margin: 10px auto; display: block; border: 2px solid #eee; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">🛒 เปี๊ยกเองจั้ฟฟ</h2>
    <div id="product-list" class="grid">กำลังโหลดสต็อกสินค้า...</div>

    <div id="checkout" class="checkout-box">
        <h3 style="margin-top:0">💰 ชำระเงิน & แจ้งที่อยู่</h3>
        <div style="text-align:center; background:#f9f9f9; padding:10px; border-radius:10px;">
            <p style="margin:0">สแกนเพื่อโอนเงิน</p>
            <img src="https://scontent.xx.fbcdn.net/v/t1.15752-9/654052002_1234243365525592_4124709852134791114_n.jpg?_nc_cat=101&ccb=1-7&_nc_sid=9f807c&_nc_ohc=1rt1YqfRdWwQ7kNvwHTWC9F&_nc_oc=AdpGonEqhpyDWekfLb8wUVYeMfCXN93nT-DZmwPkpvEsXeUWe8CW26dWXkIIdTbFNa0hieo9VmQZeXAyGPD1t88o&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&_nc_ss=7a32e&oh=03_Q7cD4wHkGUL32VZaH61LzdTwY7JzCsGlSRKg_bn1A-lnod7H2A&oe=69E77757" class="qr-img">
            <p style="font-size:0.8em; color:#666;">ชื่อบัญชี: ธีรเมธ แสงแก้ว</p>
        </div>
        
        <p id="order-summary" style="font-weight:bold; color:#28a745; margin:10px 0;"></p>
        
        <form id="orderForm">
            <input type="text" id="custName" placeholder="ชื่อของคุณ" required>
            <input type="tel" id="custPhone" placeholder="เบอร์โทร" required>
            <textarea id="custLoc" placeholder="ตึก/ห้อง/จุดนัดพบ" required></textarea>
            <label style="font-size:0.8em;">📸 แนบรูปสลิปโอนเงิน:</label>
            <input type="file" id="slipFile" accept="image/*" required>
            <button type="submit" id="confirmBtn">ยืนยันการสั่งซื้อ</button>
            <button type="button" onclick="document.getElementById('checkout').style.display='none'" style="background:#666;">ยกเลิก</button>
        </form>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz8kPEQGY2cMOyhdA_9irxm4m7pnUcr01wXuw-S5d8xAYS7pffsXJFyzpdbgvlXHdtM/exec";
    let selectedItem = {};

    async function loadProducts() {
        try {
            const res = await fetch(API_URL);
            const products = await res.json();
            let html = '';
            products.forEach(pd => {
                html += `<div class="card">
                    <img src="${pd.image || 'https://via.placeholder.com/150'}" alt="${pd.name}">
                    <h4>${pd.name}</h4>
                    <p>${pd.price}฿ | เหลือ: ${pd.stock}</p>
                    <button onclick="openCheckout('${pd.name}', ${pd.price})" ${pd.stock <= 0 ? 'disabled' : ''}>
                        ${pd.stock > 0 ? 'ซื้อเลย' : 'ของหมด'}
                    </button>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html;
        } catch(e) { document.getElementById('product-list').innerHTML = "โหลดไม่สำเร็จ เช็ค API URL"; }
    }

    function openCheckout(name, price) {
        selectedItem = { name, price };
        document.getElementById('order-summary').innerText = `รายการ: ${name} (${price} บาท)`;
        document.getElementById('checkout').style.display = 'block';
    }

    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('confirmBtn');
        const fileInput = document.getElementById('slipFile');
        btn.disabled = true; btn.innerText = "กำลังส่งข้อมูล...";

        let slipData = { base64: null, type: null };
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            const promise = new Promise((resolve) => {
                reader.onload = () => {
                    slipData.base64 = reader.result.split(',')[1];
                    slipData.type = file.type;
                    resolve();
                };
                reader.readAsDataURL(file);
            });
            await promise;
        }

        const payload = {
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            location: document.getElementById('custLoc').value,
            item: selectedItem.name,
            total: selectedItem.price,
            slipBase64: slipData.base64,
            slipType: slipData.type
        };

        try {
            await fetch(API_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(payload) 
            });
            alert('สั่งซื้อสำเร็จแล้วครับ!');
            location.reload();
        } catch (err) {
            alert('เกิดข้อผิดพลาด ลองใหม่อีกครั้ง');
            btn.disabled = false;
        }
    };

    loadProducts();
</script>
</body>
</html>
